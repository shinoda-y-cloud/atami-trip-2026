<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21st Anniversary - Atami Club Geihinkan</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --main-dark: #1a1a1a; --bg: #fdfbf7; --accent: #e91e63; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: #333; margin: 0; line-height: 1.8; overflow-x: hidden; }
        
        header {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://www.ataminews.gr.jp/storage/post_picture/[640_640]_20250115115602_FOREST%E2%91%A0.jpg');
            background-size: cover; background-position: center; height: 60vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
            border-bottom: 5px solid var(--gold);
        }
        .anniversary-text { font-family: 'Great Vibes', cursive; font-size: 4rem; color: var(--gold); margin: 0; }
        
        .container { max-width: 850px; margin: -50px auto 50px; padding: 0 20px; position: relative; z-index: 10; }
        
        /* Photo Gallery Area */
        .photo-gallery { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .polaroid {
            background: white; padding: 10px 10px 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transform: rotate(-3deg); transition: 0.3s; width: 200px;
        }
        .polaroid:nth-child(even) { transform: rotate(3deg); }
        .polaroid:hover { transform: rotate(0deg) scale(1.1); z-index: 20; }
        .polaroid img { width: 100%; height: 150px; object-fit: cover; }

        .card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; margin-bottom: 30px; border-top: 5px solid var(--gold); }
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 30px; }
        .tab-btn { background: white; border: 1px solid #ddd; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--main-dark); color: white; }
        .plan-content { display: none; animation: fadeIn 0.5s; }
        .plan-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .time-row { display: flex; margin-bottom: 20px; border-left: 2px solid var(--gold); padding-left: 20px; }
        .time { font-weight: bold; color: var(--gold); min-width: 80px; }
        .ok-btn { width: 100%; background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        footer { text-align: center; padding: 40px; color: #888; }
    </style>
</head>
<body>

<header>
    <div class="anniversary-text">21st Wedding Anniversary</div>
    <h1 style="font-family:'Shippori Mincho';">熱海倶楽部 迎賓館への旅</h1>
    <p>2026.04.30 - 05.01 | Luxury Suite Stay</p>
</header>

<div class="container">
    <div id="photo-area" class="photo-gallery">
        </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showPlan('planJ', this)">Plan J</button>
        <button class="tab-btn" onclick="showPlan('planA', this)">Plan A</button>
        <button class="tab-btn" onclick="showPlan('planB', this)">Plan B</button>
        <button class="tab-btn" onclick="showPlan('planC', this)">Plan C</button>
        <button class="tab-btn" onclick="showPlan('planD', this)">Plan D</button>
    </div>

    <div id="planJ" class="plan-content active">
        <div class="card">
            <h2 style="font-family:'Shippori Mincho'; color:var(--gold);">Plan J：じゅんワガママ改</h2>
            <div class="time-row"><div class="time">10:00</div><div class="desc"><strong>自宅 出発</strong><p>お気に入りの曲をかけて出発！</p></div></div>
            <div class="time-row"><div class="time">12:15</div><div class="desc"><strong>MOA美術館</strong><p>絶景ランチとアートを楽しむ3時間。</p></div></div>
            <div class="time-row"><div class="time">15:15</div><div class="desc"><strong>迎賓館チェックイン</strong><p>源泉かけ流しの露天風呂を堪能。</p></div></div>
            <button class="ok-btn" onclick="approvePlan('Plan J')"><i class="fa-solid fa-heart"></i> このプランに決定！</button>
        </div>
    </div>
    </div>

<footer>
    <p>これからも、素敵な時間を重ねていきましょう。<br>Happy 21st Anniversary.</p>
</footer>

<script>
    const GAS_URL = "あなたのGASウェブアプリURL";

    function showPlan(id, btn) {
        document.querySelectorAll('.plan-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    async function approvePlan(name) {
        if (!confirm(name + " にしますか？")) return;
        await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ planName: name }) });
        alert("旦那様に通知を送りました！");
    }

    // 写真をランダムに3枚表示する機能
    async function loadMemoryPhotos() {
        try {
            const res = await fetch(GAS_URL + "?action=getPhotos");
            const photos = await res.json();
            
            // ランダムに並び替えて3枚抽出
            const shuffled = photos.sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 3);
            
            const area = document.getElementById('photo-area');
            area.innerHTML = selected.map(p => `
                <div class="polaroid">
                    <img src="${p.url}" alt="memory">
                </div>
            `).join('');
        } catch (e) {
            console.error("Photo load error", e);
        }
    }
    loadMemoryPhotos();
</script>

</body>
</html>
