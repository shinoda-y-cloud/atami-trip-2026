<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20th Anniversary Trip - Atami Club Geihinkan</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Shippori+Mincho:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --main-dark: #1a1a1a;
            --bg: #fdfbf7;
        }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: #333; margin: 0; }
        header {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://www.ataminews.gr.jp/storage/post_picture/[640_640]_20250115115602_FOREST%E2%91%A0.jpg');
            background-size: cover; background-position: center; height: 60vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .anniversary-text { font-family: 'Great Vibes', cursive; font-size: 4rem; color: var(--gold); margin: 0; }
        .container { max-width: 800px; margin: -50px auto 50px; padding: 0 20px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 30px; margin-bottom: 30px; border-top: 5px solid var(--gold); }
        .time-row { display: flex; margin-bottom: 20px; border-left: 2px solid var(--gold); padding-left: 20px; }
        .time { font-weight: bold; color: var(--gold); min-width: 80px; }
        .tab-btn { padding: 10px 20px; border-radius: 20px; border: 1px solid #ddd; background: white; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--main-dark); color: white; }
    </style>
</head>
<body>

<header>
    <div class="anniversary-text">20th Anniversary</div>
    <h1 style="font-family:'Shippori Mincho';">熱海倶楽部 迎賓館への旅</h1>
    <p>2026.04.30 - 05.01 | Luxury Suite Stay</p>
</header>

<div class="container">
    <div class="card">
        <h2 style="font-family:'Shippori Mincho'; color:var(--gold); border-bottom:1px solid #eee; padding-bottom:10px;">
            Plan J：じゅんワガママ改「ゆとり旅」
        </h2>
        <img src="https://www.moaart.or.jp/wp-content/uploads/2025/10/02684105af5aeafe2c6fcda93b72b62b.jpg.webp" style="width:100%; border-radius:10px; margin-bottom:20px;">
        
        <div class="time-row">
            <div class="time">10:00</div>
            <div class="desc"><strong>自宅 出発</strong><p>カーシェアを借りて、いざ熱海へ！GWの渋滞を音楽で楽しみながら。</p></div>
        </div>
        <div class="time-row">
            <div class="time">12:30</div>
            <div class="desc"><strong>MOA美術館 ＆ ランチ</strong><p>標高250mからの絶景。館内レストランで優雅に海鮮を味わう。</p></div>
        </div>
        <div class="time-row">
            <div class="time">15:00</div>
            <div class="desc"><strong>熱海倶楽部 迎賓館 チェックイン</strong><p>70平米のスイート、自家源泉かけ流し半露天風呂。ここからが本当の休日。</p></div>
        </div>
    </div>
</div>

</body>
</html>
